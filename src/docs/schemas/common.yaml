components:
  schemas:
    # Common Enums
    RoleStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
      example: ACTIVE

    # Role Model
    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
        name:
          type: string
          example: 'Admin'
        status:
          $ref: '#/components/schemas/RoleStatus'
        isDeleted:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        roleFeature:
          type: array
          items:
            $ref: '#/components/schemas/RoleFeature'
        departmentHeads:
          type: array
          items:
            $ref: '#/components/schemas/DepartmentHead'

    RoleFeature:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174001'
        name:
          type: string
          example: 'User Management'
        index:
          type: integer
          example: 1
        path:
          type: string
          example: '/users'
        roleId:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'

    DepartmentHead:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174002'
        name:
          type: string
          example: 'John Doe'
        email:
          type: string
          format: email
          example: 'john.doe@example.com'
        phone:
          type: string
          example: '+1234567890'
        password:
          type: string
          format: password
          writeOnly: true
        profilePhoto:
          type: string
          example: 'https://example.com/photo.jpg'
        isDeleted:
          type: boolean
          example: false
        roleId:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
        createdAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174003'
        name:
          type: string
          example: 'Technology'
        createdAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'

    Blog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174004'
        title:
          type: string
          example: 'Understanding Modern Web Development'
        description:
          type: string
          example: 'A comprehensive guide to modern web development practices'
        categoryId:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174003'
        thumbnail:
          type: string
          nullable: true
          example: 'https://example.com/thumbnail.jpg'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        createdAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'

    Tag:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174005'
        name:
          type: string
          example: 'javascript'
        blogId:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174004'
        createdAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'

    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174006'
        name:
          type: string
          example: 'Jane Smith'
        email:
          type: string
          format: email
          example: 'jane.smith@example.com'
        phone:
          type: string
          example: '+1234567890'
        subject:
          type: string
          example: 'General Inquiry'
        message:
          type: string
          example: 'I would like to know more about your services'
        isOpened:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'

    # Input/Request DTOs
    CreateRoleRequest:
      type: object
      required:
        - name
        - features
      properties:
        name:
          type: string
          example: 'Editor'
        features:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: 'Content Management'
              index:
                type: integer
                example: 1
              path:
                type: string
                example: '/content'

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
          example: 'Senior Editor'
        status:
          $ref: '#/components/schemas/RoleStatus'
        features:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: 'Advanced Content Management'
              index:
                type: integer
                example: 1
              path:
                type: string
                example: '/advanced-content'

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: 'admin@example.com'
        password:
          type: string
          format: password
          example: 'password123'

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - phone
        - password
        - roleId
      properties:
        name:
          type: string
          example: 'John Doe'
        email:
          type: string
          format: email
          example: 'john.doe@example.com'
        phone:
          type: string
          example: '+1234567890'
        password:
          type: string
          format: password
          example: 'password123'
        roleId:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
        profilePhoto:
          type: string
          format: binary
          description: 'Profile photo file upload'

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
          example: 'oldpassword123'
        newPassword:
          type: string
          format: password
          example: 'newpassword123'

    # Response DTOs
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 'Login successful'
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
            refreshToken:
              type: string
              example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
            user:
              $ref: '#/components/schemas/DepartmentHead'
